spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.enabled=true

# Kun brugt første gang Flyway blev koblet på en eksisterende database,
# hvor tabellerne allerede var oprettet af Hibernate.
# Aktivér kun midlertidigt ved en bevidst baseline af en eksisterende database.
# spring.flyway.baseline-on-migrate=true
# spring.flyway.baseline-version=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Databasens EntityManager holdes ikke åben gennem hele HTTP-requesten. Databasedata bør derfor hentes
# i service-laget og gerne omdannes til DTO’er, før controlleren returnerer svaret.
#true: lazy-loaded relationer kan hentes sent, eksempelvis under JSON-konvertering.
#false: bedre kontrol over, hvornår databaseforespørgsler udføres, men du kan få LazyInitializationException,
# hvis du forsøger at hente en lazy relation for sent. Spring Boots standard er ellers true
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

