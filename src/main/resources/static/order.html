<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slikskoven - Bestil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 style="cursor: pointer;" onclick="window.location.href='forside.html'">🍬 Slikskoven</h1>
    <nav>
        <a href="forside.html">Forside</a>
        <a href="news.html">Nyheder</a>
        <a href="products.html">Produkter</a>
        <a href="order.html">Min slikpose</a>
    </nav>
</header>

<main>
    <h2>Bestil din slikpose</h2>

    <!-- Vælg metode -->
    <div id="method-container">
        <button class="method-btn fancy" onclick="openSelectModal()">
            🍬 Vælg selv
        </button>

        <button class="method-btn fancy" onclick="openCommentModal()">
            💬 Skriv kommentar
        </button>
    </div>

    <!-- Manuel valg -->
    <div id="manual-section">
        <h3>Vælg produkter</h3>


        <h3>Din pose</h3>
        <div id="order-lines">
            <p class="ingen-nyheder">Ingen produkter valgt endnu.</p>
        </div>
        <div id="total-price">Total: 0.00 kr.</div>
    </div>

    <!-- Kommentar valg -->
    <div id="comment-section" style="display:none;">
        <h3>Skriv dine ønsker</h3>
        <textarea id="comment-input" placeholder="Eks: Jeg vil gerne have en pose på 300g med lidt surt, lidt chokolade og noget lakrids."></textarea>
    </div>

    <!-- Kontaktinfo -->
    <div id="contact-section">
        <h3>Dine oplysninger</h3>
        <input type="text" id="customer-name" placeholder="Navn">
        <input type="text" id="customer-phone" placeholder="Telefonnummer">
    </div>

    <button id="submit-btn" onclick="submitOrder()">Send bestilling</button>

    <div id="confirmation" style="display:none;">
        <h3> Tak for din bestilling!</h3>
        <p>Vi behandler din ordre hurtigst muligt.</p>
    </div>

    <div id="error-message" style="display:none;"></div>

    <div id="select-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeSelectModal()">&times;</span>
            <h3>Vælg slik</h3>
            <div id="select-modal-items"></div>
        </div>
    </div>

    <div id="comment-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCommentModal()">&times;</span>
            <h3>Skriv kommentar</h3>
            <textarea id="modal-comment" placeholder="Skriv dine ønsker..."></textarea>
            <button onclick="saveComment()">Gem</button>
        </div>
    </div>
</main>

<script src="api.js"></script>
<script src="order.js"></script>
</body>
</html>
