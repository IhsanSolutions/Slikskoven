<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Admin - Nyheder</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>Slikskoven Admin</h1>

    <nav>
        <a href="/admin/adminDashboard.html">Dashboard</a>
        <a href="/news.html">Offentlig nyhedsside</a>
        <a href="/products.html">Produkter</a>
        <a href="/order.html">Min slikpose</a>

        <form action="/logout" method="post" style="display:inline;">
            <button type="submit">Log ud</button>
        </form>
    </nav>
</header>

<main>
    <h2>Administrér nyheder</h2>

    <section>
        <h3>Opret ny nyhed</h3>

        <form id="create-news-form">
            <input type="text" id="title" placeholder="Titel" required>

            <textarea id="content" placeholder="Indhold" required></textarea>

            <input type="text" id="imageUrl" placeholder="Billede URL">

            <button type="submit">Opret nyhed</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>Eksisterende nyheder</h3>

        <div id="admin-news-container">
            <p>Henter nyheder...</p>
        </div>
    </section>
</main>

<script src="/api.js"></script>
<script src="/admin/adminAuth.js"></script>
<script src="/admin/adminNews.js"></script>

</body>
</html>
