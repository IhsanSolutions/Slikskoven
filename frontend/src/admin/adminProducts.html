<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Admin - Produkter</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>Slikskoven Admin</h1>

    <nav>
        <a href="/admin/adminDashboard.html">Dashboard</a>
        <a href="/products.html">Offentlig produktside</a>
        <a href="/news.html">Nyheder</a>
        <a href="/order.html">Min slikpose</a>

        <button type="button" onclick="logout()">Log ud</button>
    </nav>
</header>

<main>
    <h2>Administrér produkter</h2>

    <section>
        <h3>Opret nyt produkt</h3>

        <form id="create-product-form">
            <input type="text" id="name" placeholder="Produktnavn" required>

            <textarea id="description" placeholder="Beskrivelse"></textarea>

            <input type="number" id="price" placeholder="Pris pr. 100g" step="0.01" min="0" required>

            <input type="number" id="stockQuantity" placeholder="Lagerantal" min="0" required>

            <input type="text" id="imageUrl" placeholder="Billede URL">

            <select id="category" required>
                <option value="">Vælg kategori</option>
                <option value="CANDY">Slik</option>
                <option value="ICE_CREAM">Is</option>
                <option value="COFFEE">Kaffe</option>
                <option value="SLUSH_ICE">Slush ice</option>
                <option value="SOFT_ICE">Softice</option>
                <option value="BLAND_SELV">Bland selv</option>
                <option value="PANCAKE">Pancakes</option>
                <option value="BEN_AND_JERRYS">Ben & Jerry's</option>
            </select>

            <select id="gelatineType" required>
                <option value="">Vælg gelatinetype</option>
                <option value="WITH_GELATINE">Med gelatine</option>
                <option value="WITHOUT_GELATINE">Uden gelatine</option>
            </select>

            <button type="submit">Opret produkt</button>
        </form>
    </section>

    <hr>

    <section>
        <h3>Eksisterende produkter</h3>

        <div id="admin-products-container">
            <p>Henter produkter...</p>
        </div>
    </section>
</main>

<script src="/api.js"></script>
<script src="/admin/adminAuth.js"></script>
<script src="/admin/adminProducts.js"></script>

</body>
</html>
