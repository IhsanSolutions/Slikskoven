<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Admin - Ordrer</title>
    <link rel="stylesheet" href="/styles/shared.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body>

<header>
    <h1>Slikskoven Admin</h1>

    <nav>
        <a href="/admin/adminDashboard.html">Dashboard</a>
        <a href="/admin/adminNews.html">Nyheder</a>
        <a href="/admin/adminProducts.html">Produkter</a>
        <a href="/forside.html">Forside</a>

        <button type="button" onclick="logout()">Log ud</button>
    </nav>
</header>

<main>
    <h2>Administrér ordrer</h2>

    <section>
        <p>
            Her kan du se nye bestillinger og ændre deres status.
        </p>

        <div class="order-filter-bar" aria-label="Filtrér ordrer">
            <button
                    type="button"
                    class="order-filter-button active"
                    data-order-status="ALL"
            >
                Alle
                <span id="order-count-all">0</span>
            </button>

            <button
                    type="button"
                    class="order-filter-button"
                    data-order-status="MODTAGET"
            >
                Modtaget
                <span id="order-count-modtaget">0</span>
            </button>

            <button
                    type="button"
                    class="order-filter-button"
                    data-order-status="KLAR"
            >
                Klar
                <span id="order-count-klar">0</span>
            </button>

            <button
                    type="button"
                    class="order-filter-button"
                    data-order-status="AFHENTET"
            >
                Afhentet
                <span id="order-count-afhentet">0</span>
            </button>
        </div>

        <div id="admin-orders-container">
            <p>Henter ordrer...</p>
        </div>
    </section>
</main>

<script src="/js/shared/api.js"></script>
<script src="/js/admin/adminAuth.js"></script>
<script src="/js/admin/adminOrders.js"></script>

</body>
</html>
