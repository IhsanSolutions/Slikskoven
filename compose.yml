services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slikskoven-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slikskoven-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/slikskoven
      SPRING_DATASOURCE_USERNAME: slikuser
      SPRING_DATASOURCE_PASSWORD: slikpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: slikskoven-db
    environment:
      MYSQL_DATABASE: slikskoven
      MYSQL_USER: slikuser
      MYSQL_PASSWORD: slikpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uslikuser", "-pslikpass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data: