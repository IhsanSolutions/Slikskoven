services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slikskoven-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slikskoven-backend

    environment:
      SPRING_PROFILES_ACTIVE: local

      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_URL}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

    expose:
      - "8080"

    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: slikskoven-db

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mysql-data:/var/lib/mysql

    ports:
      - "3307:3306"

    healthcheck:
      test: [
        "CMD-SHELL",
        "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"
      ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data: